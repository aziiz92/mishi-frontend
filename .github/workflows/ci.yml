name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm install --global npm@11.16.0
          npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  container:
    name: Build container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag mishi-frontend:ci .

  deploy:
    name: Deploy to Dokploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [checks, container]
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          test -n "$DOKPLOY_URL"
          test -n "$DOKPLOY_API_KEY"
          test -n "$DOKPLOY_APPLICATION_ID"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "$DOKPLOY_URL/api/application.deploy" \
            --header "accept: application/json" \
            --header "Content-Type: application/json" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --data "{\"applicationId\":\"$DOKPLOY_APPLICATION_ID\"}"
