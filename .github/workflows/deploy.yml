name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: frontend-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  dokploy:
    name: Deploy to Dokploy
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      (github.event.workflow_run.head_branch == 'develop' ||
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'development' }}

    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        run: |
          test -n "$DOKPLOY_URL"
          test -n "$DOKPLOY_API_KEY"
          test -n "$DOKPLOY_APPLICATION_ID"
          curl --fail-with-body --silent --show-error \
            --request POST \
            "$DOKPLOY_URL/api/application.deploy" \
            --header "accept: application/json" \
            --header "Content-Type: application/json" \
            --header "x-api-key: $DOKPLOY_API_KEY" \
            --data "{\"applicationId\":\"$DOKPLOY_APPLICATION_ID\"}"
